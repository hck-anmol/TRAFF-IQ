<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Traffic Log</title>
    <style>
        body { font-family: monospace; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; }
        h1 { color: #4CAF50; }
        #log-container { display: flex; flex-direction: column; gap: 15px; }
        .log-entry { background-color: #2c2c2c; border-left: 5px solid #4CAF50; padding: 15px; border-radius: 5px; white-space: pre-wrap; transition: background-color 0.5s; }
        .log-entry.new { background-color: #3c5c3d; }
        .lane-info { color: #aaa; }
        .green { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Live Traffic Log for Intersection: <span id="intersection-id"></span></h1>
    <div id="log-container">
        <p>Waiting for data...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    
    <script>
        const logContainer = document.getElementById('log-container');
        const intersectionIdSpan = document.getElementById('intersection-id');
        const socket = io();
        socket.on('new_data', function(data) {
            console.log('Received new data:', data);
            addLogEntry(data, true); 
        });

        function addLogEntry(data, isNew = false) {
            const entryDiv = document.createElement('div');
            entryDiv.className = 'log-entry';

            const greenLane = data.current_green_lane;
            
            let lanesHtml = '';
            for (const [direction, details] of Object.entries(data.lanes)) {
                const isGreen = direction === greenLane;
                const className = isGreen ? 'green' : 'lane-info';
                lanesHtml += `  <span class="${className}">${direction}: Density=${details.density.toFixed(1)}, Wait=${Math.round(details.wait_time)}s</span>\n`;
            }

            entryDiv.innerHTML = `<strong>Timestamp:</strong> ${data.timestamp}\n<strong>GREEN LIGHT: ${greenLane}</strong>\n${lanesHtml}`;
            
            logContainer.prepend(entryDiv);
            
            if (isNew) {
                entryDiv.classList.add('new');
                setTimeout(() => {
                    entryDiv.classList.remove('new');
                }, 1000);
            }
        }
        
        async function fetchHistory() {
            try {
                const response = await fetch('/get_all_data');
                const history = await response.json();
                
                if (history && history.length > 0) {
                    logContainer.innerHTML = ''; 
                    intersectionIdSpan.textContent = history[0].intersection_id;
                    history.forEach(log => addLogEntry(log));
                }
            } catch (error) {
                console.error("Failed to fetch history:", error);
                logContainer.innerHTML = '<p>Could not load historical data.</p>';
            }
        }

        fetchHistory();

    </script>
</body>
</html>
